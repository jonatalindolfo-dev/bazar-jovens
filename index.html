<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bazar Jovens">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1565C0">
  <title>Bazar dos Jovens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #1565C0;
      --blue-pale: #E3F2FD;
      --green:     #2E7D32;
      --whatsapp:  #25D366;
      --red:       #D32F2F;
      --bg:        #EEF2FF;
      --card:      #FFFFFF;
      --text:      #1A1A2E;
      --muted:     #757575;
      --shadow:    0 2px 14px rgba(21,101,192,0.13);
      --radius:    18px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    #app {
      height: 100%;
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Telas ───────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s;
    }
    .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .screen.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
    .screen.visible      { transform: translateX(0);     opacity: 1; }

    /* ── Cabeçalho ───────────────────────────────────────── */
    .app-header {
      background: var(--blue);
      color: #fff;
      padding: 16px 20px 13px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.22);
      flex-shrink: 0;
      position: relative;
    }
    .app-header h1  { font-size: 20px; font-weight: 700; letter-spacing: .4px; }
    .app-header .sub{ font-size: 12px; opacity: .72; margin-top: 2px; }
    .back-btn {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #fff; font-size: 22px;
      padding: 8px; cursor: pointer; line-height: 1;
    }

    /* ── Lista de itens ──────────────────────────────────── */
    .item-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-row {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .item-price {
      font-size: 19px;
      font-weight: 700;
      color: var(--blue);
      width: 78px;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 50px; height: 50px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; line-height: 1;
      color: #fff;
      transition: transform .1s, filter .1s;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .qty-btn:active { transform: scale(.91); filter: brightness(.88); }
    .qty-btn.dec { background: #EF5350; }
    .qty-btn.inc { background: var(--green); }

    .qty-value {
      width: 50px;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      transition: transform .12s;
    }
    .qty-value.bump { transform: scale(1.25); }

    .item-sub {
      flex: 1;
      text-align: right;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      transition: color .2s;
    }
    .item-sub.zero { color: #ccc; }

    /* ── Barra de total ──────────────────────────────────── */
    .total-bar {
      background: var(--blue);
      padding: 13px 22px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 -3px 12px rgba(0,0,0,.16);
      flex-shrink: 0;
    }
    .total-bar .qty-txt { color: rgba(255,255,255,.76); font-size: 15px; }
    .total-bar .val-txt { color: #fff; font-size: 32px; font-weight: 700; }

    /* ── Botões de ação ──────────────────────────────────── */
    .action-bar {
      background: #fff;
      padding: 12px 14px;
      padding-bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      height: 54px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .1s, filter .1s;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
    }
    .btn:active  { transform: scale(.96); filter: brightness(.92); }
    .btn:disabled { opacity: .45; pointer-events: none; }

    .btn-outline  { background: transparent; border: 2px solid var(--blue); color: var(--blue); flex: 1; }
    .btn-finalize { background: var(--green); color: #fff; flex: 2; font-size: 20px; }
    .btn-blue     { background: var(--blue);      color: #fff; width: 100%; font-size: 18px; }
    .btn-green    { background: var(--green);     color: #fff; width: 100%; font-size: 18px; }
    .btn-whatsapp { background: var(--whatsapp);  color: #fff; width: 100%; font-size: 18px; }

    /* ── Tela de resumo ──────────────────────────────────── */
    .summary-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .receipt-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 22px;
      box-shadow: var(--shadow);
    }

    .receipt-header {
      text-align: center;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .dashed { border: none; border-top: 1.5px dashed #ccc; margin: 12px 0; }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
    }
    .receipt-row .rname { font-size: 16px; }
    .receipt-row .rsub  { font-size: 16px; font-weight: 700; color: var(--green); }

    .pieces-row {
      display: flex; justify-content: space-between;
      font-size: 14px; color: var(--muted); padding: 4px 0;
    }

    .total-box {
      background: var(--blue);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
    }
    .total-box .tb-label { color: rgba(255,255,255,.8); font-size: 14px; font-weight: 600; }
    .total-box .tb-value { color: #fff; font-size: 28px; font-weight: 700; }

    .receipt-thanks {
      text-align: center; color: var(--muted); font-size: 13px; margin-top: 10px;
    }

    /* ── Campo: Nome do comprador ────────────────────────── */
    .name-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .name-card label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }
    .name-input {
      width: 100%;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 17px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      transition: border-color .2s, box-shadow .2s;
      background: #FAFAFA;
    }
    .name-input::placeholder { color: #BDBDBD; }
    .name-input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(21,101,192,.1);
    }
    .name-input.shake {
      border-color: var(--red);
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-7px); }
      75%      { transform: translateX(7px); }
    }

    /* ── Botões da tela de resumo ────────────────────────── */
    .summary-btns {
      background: #fff;
      padding: 12px 16px;
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 11px;
      box-shadow: 0 -2px 10px rgba(0,0,0,.09);
      flex-shrink: 0;
    }

    /* ── Dialog central ──────────────────────────────────── */
    .dialog-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.52);
      z-index: 60;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .dialog-overlay.open { display: flex; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .dialog {
      background: #fff;
      border-radius: 22px;
      padding: 30px 26px 20px;
      max-width: 340px; width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
      animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from { transform: scale(.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .d-icon   { font-size: 44px; text-align: center; margin-bottom: 12px; }
    .d-title  { font-size: 19px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .d-body   { font-size: 14px; color: var(--muted); line-height: 1.65; text-align: center; margin-bottom: 22px; }
    .d-body strong { color: var(--text); }
    .d-actions { display: flex; gap: 10px; }
    .d-btn {
      flex: 1; padding: 13px;
      border: none; border-radius: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .d-btn:active  { filter: brightness(.92); }
    .d-btn.cancel  { background: #F0F0F0; color: var(--text); }
    .d-btn.danger  { background: var(--red);       color: #fff; }
    .d-btn.primary { background: var(--blue);      color: #fff; }
    .d-btn.success { background: var(--green);     color: #fff; }
    .d-btn.wpp     { background: var(--whatsapp);  color: #fff; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spin {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 110px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 14px; font-weight: 500;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 100;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════════
       TELA 1 — PDV
  ══════════════════════════════════════════════════════ -->
  <div id="sale-screen" class="screen visible">

    <header class="app-header">
      <h1>Bazar dos Jovens</h1>
      <div class="sub">PDV — Ponto de Venda</div>
    </header>

    <div class="item-list" id="item-list"></div>

    <div class="total-bar">
      <span class="qty-txt" id="bar-qty">0 peças</span>
      <span class="val-txt" id="bar-val">R$ 0,00</span>
    </div>

    <div class="action-bar">
      <button class="btn btn-outline" onclick="confirmClear()">🗑 Limpar</button>
      <button class="btn btn-finalize" onclick="goSummary()">✅ Finalizar</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TELA 2 — RESUMO
  ══════════════════════════════════════════════════════ -->
  <div id="summary-screen" class="screen hidden-right">

    <header class="app-header">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <h1>Resumo da Venda</h1>
    </header>

    <div class="summary-scroll">

      <!-- Cupom visual -->
      <div class="receipt-card">
        <div class="receipt-header">BAZAR DOS JOVENS</div>
        <hr class="dashed">
        <div id="r-items"></div>
        <hr class="dashed">
        <div class="pieces-row">
          <span>Total de peças:</span>
          <strong id="r-qty">0</strong>
        </div>
        <div class="total-box">
          <span class="tb-label">TOTAL A PAGAR</span>
          <span class="tb-value" id="r-val">R$ 0,00</span>
        </div>
        <hr class="dashed" style="margin-top:14px">
        <div class="receipt-thanks">Obrigado pela compra!</div>
      </div>

      <!-- Nome do comprador -->
      <div class="name-card">
        <label>👤 Nome do Comprador</label>
        <input
          class="name-input"
          id="buyer-name"
          type="text"
          placeholder="Ex: João Silva"
          autocomplete="off"
          inputmode="text"
        >
      </div>

    </div><!-- /summary-scroll -->

    <div class="summary-btns">
      <button class="btn btn-whatsapp" id="btn-send" onclick="sendToWhatsApp()">
        💬 Enviar para Caixa
      </button>
      <button class="btn btn-outline" onclick="goBack()">
        ✏️ Editar Venda
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       DIALOG — Confirmar limpeza
  ══════════════════════════════════════════════════════ -->
  <div class="dialog-overlay" id="clear-dlg">
    <div class="dialog">
      <div class="d-icon">🗑</div>
      <div class="d-title">Limpar venda?</div>
      <div class="d-body">Todas as quantidades serão zeradas.</div>
      <div class="d-actions">
        <button class="d-btn cancel" onclick="closeDlg('clear-dlg')">Cancelar</button>
        <button class="d-btn danger"  onclick="clearSale()">Limpar</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       DIALOG — Venda enviada → Nova venda?
  ══════════════════════════════════════════════════════ -->
  <div class="dialog-overlay" id="sent-dlg">
    <div class="dialog">
      <div class="d-icon">✅</div>
      <div class="d-title">Venda enviada ao caixa!</div>
      <div class="d-body">Deseja iniciar uma nova venda?</div>
      <div class="d-actions">
        <button class="d-btn cancel"  onclick="closeDlg('sent-dlg')">Não</button>
        <button class="d-btn success" onclick="startNewSale()">Nova Venda</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
//  ⚙️  CONFIGURAÇÃO — altere apenas esta variável
// ════════════════════════════════════════════════════════════

const NUMERO_CAIXA = '5583999082678';
// Formato: código do país + DDD + número, SEM espaços ou traços
// Exemplo Brasil: '5511987654321'

// ════════════════════════════════════════════════════════════
//  Estado
// ════════════════════════════════════════════════════════════

const PRICES = [2, 5, 10, 20, 30];

const state = {
  items: PRICES.map(p => ({ price: p, qty: 0 })),
};

// ════════════════════════════════════════════════════════════
//  Formatação
// ════════════════════════════════════════════════════════════

const fmt  = v => 'R$ ' + v.toFixed(2).replace('.', ',');
const fmtQ = n => n === 1 ? '1 peça' : `${n} peças`;

function horaAtual() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

// ════════════════════════════════════════════════════════════
//  Totais
// ════════════════════════════════════════════════════════════

function totals() {
  const qty = state.items.reduce((s, i) => s + i.qty, 0);
  const val = state.items.reduce((s, i) => s + i.price * i.qty, 0);
  return { qty, val };
}

// ════════════════════════════════════════════════════════════
//  Renderiza lista PDV
// ════════════════════════════════════════════════════════════

function renderList() {
  document.getElementById('item-list').innerHTML = state.items.map((item, i) => `
    <div class="item-row">
      <span class="item-price">${fmt(item.price)}</span>
      <button class="qty-btn dec" ontouchstart="" onclick="dec(${i})">−</button>
      <span class="qty-value" id="qv-${i}">${item.qty}</span>
      <button class="qty-btn inc" ontouchstart="" onclick="inc(${i})">+</button>
      <span class="item-sub${item.qty === 0 ? ' zero' : ''}" id="sub-${i}">${fmt(item.price * item.qty)}</span>
    </div>
  `).join('');
  refreshBar();
}

function refreshBar() {
  const { qty, val } = totals();
  document.getElementById('bar-qty').textContent = fmtQ(qty);
  document.getElementById('bar-val').textContent = fmt(val);
}

// ════════════════════════════════════════════════════════════
//  Incremento / Decremento
// ════════════════════════════════════════════════════════════

function inc(i) {
  state.items[i].qty++;
  updateRow(i);
}

function dec(i) {
  if (state.items[i].qty === 0) return;
  state.items[i].qty--;
  updateRow(i);
}

function updateRow(i) {
  const item = state.items[i];
  const qEl  = document.getElementById(`qv-${i}`);
  const sEl  = document.getElementById(`sub-${i}`);

  qEl.textContent = item.qty;
  sEl.textContent = fmt(item.price * item.qty);
  sEl.className   = 'item-sub' + (item.qty === 0 ? ' zero' : '');

  qEl.classList.remove('bump');
  void qEl.offsetWidth;
  qEl.classList.add('bump');
  setTimeout(() => qEl.classList.remove('bump'), 150);

  refreshBar();
}

// ════════════════════════════════════════════════════════════
//  Limpar venda
// ════════════════════════════════════════════════════════════

function confirmClear() {
  document.getElementById('clear-dlg').classList.add('open');
}

function clearSale() {
  state.items.forEach(i => i.qty = 0);
  renderList();
  closeDlg('clear-dlg');
  toast('Venda limpa', '#546E7A');
}

// ════════════════════════════════════════════════════════════
//  Navegação
// ════════════════════════════════════════════════════════════

function goSummary() {
  if (totals().qty === 0) {
    toast('Adicione pelo menos um item', '#E65100');
    return;
  }
  renderSummary();
  document.getElementById('buyer-name').value = '';
  document.getElementById('sale-screen').classList.replace('visible', 'hidden-left');
  document.getElementById('summary-screen').classList.replace('hidden-right', 'visible');
  setTimeout(() => document.getElementById('buyer-name').focus(), 380);
}

function goBack() {
  document.getElementById('summary-screen').classList.replace('visible', 'hidden-right');
  document.getElementById('sale-screen').classList.replace('hidden-left', 'visible');
}

function startNewSale() {
  state.items.forEach(i => i.qty = 0);
  renderList();
  closeDlg('sent-dlg');
  document.getElementById('summary-screen').classList.replace('visible', 'hidden-right');
  document.getElementById('sale-screen').classList.replace('hidden-left', 'visible');
}

// ════════════════════════════════════════════════════════════
//  Renderiza resumo
// ════════════════════════════════════════════════════════════

function renderSummary() {
  const active = state.items.filter(i => i.qty > 0);
  const { qty, val } = totals();

  document.getElementById('r-items').innerHTML = active.map(item => `
    <div class="receipt-row">
      <span class="rname">${fmt(item.price)} &times; ${item.qty}</span>
      <span class="rsub">${fmt(item.price * item.qty)}</span>
    </div>
  `).join('');

  document.getElementById('r-qty').textContent = qty;
  document.getElementById('r-val').textContent = fmt(val);
}

// ════════════════════════════════════════════════════════════
//  WhatsApp
// ════════════════════════════════════════════════════════════

function sendToWhatsApp() {
  const nameInput = document.getElementById('buyer-name');
  const nome = nameInput.value.trim();

  // Valida nome
  if (!nome) {
    nameInput.classList.remove('shake');
    void nameInput.offsetWidth;
    nameInput.classList.add('shake');
    setTimeout(() => nameInput.classList.remove('shake'), 400);
    nameInput.focus();
    toast('Informe o nome do comprador', '#E65100');
    return;
  }

  const mensagem = buildMessage(nome);
  const url = `https://wa.me/${NUMERO_CAIXA}?text=${encodeURIComponent(mensagem)}`;

  // Abre o WhatsApp
  window.open(url, '_blank');

  // Feedback e pergunta sobre nova venda
  toast('Venda enviada ao caixa!', '#25D366');
  setTimeout(() => document.getElementById('sent-dlg').classList.add('open'), 600);
}

function buildMessage(nome) {
  const active   = state.items.filter(i => i.qty > 0);
  const { qty, val } = totals();
  const hora     = horaAtual();

  const itensLinhas = active
    .map(i => `${fmt(i.price)} x ${i.qty} = ${fmt(i.price * i.qty)}`)
    .join('\n');

  return [
    '🛒 *NOVA VENDA - BAZAR DOS JOVENS*',
    '',
    `👤 Cliente: ${nome}`,
    '',
    '📦 Itens:',
    itensLinhas,
    '',
    `📊 Total de peças: ${qty}`,
    '',
    `💰 Total a pagar: ${fmt(val)}`,
    '',
    `⏰ Horário: ${hora}`,
  ].join('\n');
}

// ════════════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════════════

function closeDlg(id) {
  document.getElementById(id).classList.remove('open');
}

let toastTimer;
function toast(msg, bg = '#333') {
  const el = document.getElementById('toast');
  el.textContent      = msg;
  el.style.background = bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════════════════

renderList();
</script>
